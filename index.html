<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;700;800&display=swap" rel="stylesheet">
    <title>My-Portfolio</title>
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="logo-container">
                    <p class="logo">Port<span>folio</span></p>
                </div>
                <div class="menu">
                    <img src="./shapes/Union.svg" alt="menu">
                </div>
            </div>
        </nav>
        <section class="headline">
            <div class="background-strokes">
                <img src="./shapes/Group 35.svg" alt="">
            </div>
            <div class="frames">
                <div class="top-right-frame">
                    <img src="./shapes/Frame.svg" alt="">
                </div>
                <div class="middle-right-frame">
                    <img src="./shapes/Group 36.svg" alt="">
                </div>
                <div class="bottom-right-frame">
                    <img src="./shapes/Frame (2).svg" alt="">
                </div>
                <div class="middle-frame">
                    <img src="./shapes/Frame (1).svg" alt="">
                </div>
                <div class="left-bottom">
                    <img src="./shapes/Group 37.svg" alt="">
                </div>
                <div class="transparent-frame">
                    <img src="./shapes/Group 38.svg" alt="">
                </div>
            </div>
            
            <div class="text-container">
                <div class="blueblack-header">
                    <h1>Hey there. I'm Antwi</h1>
                </div>
                <div class="green-header">
                    <h1>I'm a software developer</h1>
                </div>
                <div class="supporting-text">
                    <p> I can help you build a product , 
                        feature or website Look through some of my work and experience! 
                        If you like what you see and have a project you need coded, 
                        don’t hestiate to contact me.
                    </p>
                </div>
            </div>
            <div class="social-media-icons">
                <img src="./shapes/social media icons.svg" alt="">
            </div>
            
        </section>
    </header>
    
</body>
</html>
